# =====================================================================
# My Niche (毎日) — Cultural Correction Golden Dataset
# Version: 1.1 | Created: 2026-05-10 | Total: 90 cases
# =====================================================================
#
# Purpose:
#   Claude Haiku 기반 문화 교정 자동 감지 프롬프트의 정확도를 측정하기 위한
#   golden dataset. 개발 시작 전(2026.7-8월) Eval 셋업의 기준 데이터.
#
# Pass Criteria:
#   - Binary accuracy (needs_correction 일치): 85% 이상
#   - Type accuracy (correction_type 일치, positive only): 75% 이상
#   - False positive rate (negative case 오판정): 15% 이하
#   - False negative rate (positive 놓침): 25% 이하   [v1.1 추가]
#
#   주: false negative criteria는 v1.1에서 추가됨.
#       처음 약속한 Positive 50:Negative 30 분포가 작성 도중
#       42:48로 변경되어, positive 케이스에서의 누락이 더 치명적이 됨.
#       "교정 필요한 걸 놓치는 비율"이 사용자 가치에 직접 영향.
#
# Distribution:
#   Positive (교정 필요)        : 42 cases
#   Negative (직역 OK)          : 48 cases
#
#   Category    : 일상 23 / 육아 22 / 직장 21 / 소셜 14 / 관공서 10
#   Level       : N3 50 / N5 40
#   Edge case   : 10 cases (정답 모호, AI 판단 관찰용)
#
# Correction Types (positive 42개 분포):
#   가족호칭 8 / 경어 7 / 감정표현 7 / 수치 6 / 문화어휘 6 / 겸양 4 / 나이 4
#
# Type Definitions (v1.1 추가):
#   문화어휘: 한국식 어휘를 일본 제도/문화에 맞는 어휘로 변환
#            (예: 마트→スーパー, 비자→在留資格, 보증금→敷金+礼金)
#            v1.0에서 감정표현으로 잘못 분류되었던 케이스를 재분류
#
# Field Definitions:
#   id              : GD-{NNN}
#   input_kr        : 사용자가 입력했다고 가정한 한국어
#   category        : 직장 / 육아 / 일상 / 관공서 / 소셜
#   level           : N5 / N3
#   needs_correction: true / false
#   correction_type : 수치 / 가족호칭 / 경어 / 나이 / 겸양 / 감정표현 / 문화어휘 / none
#   expected_jp     : 기대되는 일본어 표현 (구어체 정중체 기본)
#   explanation     : 판정 근거 1-2문장
#   note_for_eval   : (선택) edge case일 때 채점 가이드
#
# =====================================================================

# ============================================================
# SECTION 1. 육아 (20 cases)
# ============================================================

- id: GD-001
  input_kr: "저희 아이는 얼마전에 22개월이 되었어요"
  category: 육아
  level: N3
  needs_correction: true
  correction_type: 수치
  expected_jp: "うちの子はこの前1歳10ヶ月になりました"
  explanation: "한국은 만 나이 + 개월 수로 표현하지만, 일본은 24개월 미만은 '○歳○ヶ月' 형식이 자연스럽다. 22개월 = 1歳10ヶ月."

- id: GD-002
  input_kr: "우리 남편이 요즘 야근이 많아서 힘들어해요"
  category: 육아
  level: N3
  needs_correction: true
  correction_type: 가족호칭
  expected_jp: "うちの主人、最近残業が多くて大変そうなんです"
  explanation: "'우리 남편'을 '私の夫'로 직역하면 격식체가 되어 어색. 일상 대화에서는 'うちの主人' 또는 'うちの旦那'가 자연스럽다."

- id: GD-003
  input_kr: "우리 아이가 정말 똑똑해서 한 번 보고 다 외워요"
  category: 육아
  level: N3
  needs_correction: true
  correction_type: 겸양
  expected_jp: "うちの子、覚えるのが早い方かもしれません"
  explanation: "한국에서는 자녀 자랑이 일상적이지만, 일본은 자녀 자랑을 직접적으로 하지 않는 문화. '~方かもしれません'으로 톤다운."
  note_for_eval: "edge case — 교정 강도 모호. AI는 '말하지 않는 게 낫다'가 아니라 톤다운 표현을 제시해야 함."

- id: GD-004
  input_kr: "우리 엄마가 이번 주에 일본에 오세요"
  category: 육아
  level: N3
  needs_correction: true
  correction_type: 가족호칭
  expected_jp: "母が今週日本に来ます"
  explanation: "타인에게 자기 어머니를 말할 때, 일본에서는 '母'(겸양형)가 표준. '私のお母さん'은 타인의 어머니를 부르는 표현. 자기 가족에 'いらっしゃる' 같은 존경어 사용도 부적절."

- id: GD-005
  input_kr: "아이가 어린이집에서 또래보다 좀 큰 편이에요"
  category: 육아
  level: N3
  needs_correction: false
  correction_type: none
  expected_jp: "子供が保育園で同じ月齢の子より大きめです"
  explanation: "한국식 사고와 일본식이 일치하는 표현. '큰 편이에요'를 '大きめです'로 직역해도 자연스럽다. 단, '어린이집' → '保育園' 어휘 매칭은 필요."

- id: GD-006
  input_kr: "우리 아빠가 환갑이라 한국에 다녀왔어요"
  category: 육아
  level: N3
  needs_correction: true
  correction_type: 가족호칭
  expected_jp: "父の還暦で韓国に帰省してきました"
  explanation: "'우리 아빠' → '父' (겸양형). 또한 '환갑' 개념은 일본에도 있지만(還暦), 일본은 한국만큼 큰 의례로 챙기지 않는 문화 차이도 있음."

- id: GD-007
  input_kr: "아이가 이번에 5살이 되었어요"
  category: 육아
  level: N5
  needs_correction: true
  correction_type: 나이
  expected_jp: "子供が今度4歳になりました"
  explanation: "한국식 세는 나이(태어난 해 1살 + 새해마다 +1)와 일본식 만 나이는 1-2살 차이. 한국 5살 ≈ 일본 4歳. 단, 사용자가 이미 만 나이로 입력했을 가능성도 있어 확인 필요."
  note_for_eval: "edge case — 사용자가 이미 만 나이로 5살이라고 입력했다면 교정 불필요. AI가 사용자에게 '한국 나이인가요 만 나이인가요' 확인 옵션을 제시하면 best."

- id: GD-008
  input_kr: "보육원 선생님한테 인사를 어떻게 해야 할지 모르겠어요"
  category: 육아
  level: N3
  needs_correction: false
  correction_type: none
  expected_jp: "保育園の先生にどう挨拶したらいいか分かりません"
  explanation: "단순한 고민 표현. 직역으로 자연스럽고 문화 교정 필요 없음. 단, 후속 응답에서 '실제 인사 표현'을 가르쳐주는 게 가치."

- id: GD-009
