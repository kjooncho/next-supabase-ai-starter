  :root {
    /* ===== Brand color tokens (Design System Sheet 기준) ===== */
    /* Logo & Primary */

    --brand-accent: #e8541a;      /* Vermillion — CTA, 강조 (Daruma) */

    --surface: #ffffff;           /* White — 카드 배경 */

    --mnemonic: #9b59b6;          /* Soft Purple — 니모닉 카드 */
    --real-use: #27ae60;          /* Bright Green — 써봤어요 (실전 사용 기록) */
    --map-pin: #e74c3c;           /* Red — 지도 핀 */

    --ink-primary: #1a1a1a;       /* Text Primary */
    --ink-secondary: #6b6b6b;     /* Text Secondary */
    --ink-tertiary: #9c9a92;      /* Text Tertiary (보조 — 시트엔 없으나 UI 전반에 필요) */

    --tag-bg: #f0ede6;            /* Tag Background */
    --hairline: #e8e4dc;          /* 구분선 — 시트엔 명시 안 됨, 일관성 위해 정의 */

    --shadow-card: 0 4px 12px rgba(26, 31, 61, 0.08);

  * { -webkit-tap-highlight-color: transparent; }
  
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-primary);
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink-primary);
    overscroll-behavior: none;
  }

  .font-display {
    font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* Daruma avatar — flat, no gradient */
  .daruma-svg { width: 100%; height: 100%; }

  /* Tab bar enter animation */
  @keyframes slideUp {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .anim-slide-up {
    animation: slideUp 0.4s cubic-bezier(0.0, 0.0, 0.2, 1);
  }

  /* Step reveal animation for translation */
  @keyframes fadeInLeft {
    from { transform: translateX(-12px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .anim-step-reveal {
    animation: fadeInLeft 0.4s ease-out backwards;
  }

  /* Subtle paper texture for cards */
  .paper-texture {
    background-image: 
      radial-gradient(circle at 1px 1px, rgba(26, 31, 61, 0.015) 1px, transparent 0);
    background-size: 16px 16px;
  }

  /* Loading dots */
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }
  .dot { animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Modal animations */
  @keyframes overlayFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes modalSlideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-overlay {
    animation: overlayFadeIn 0.25s ease-out;
  }
  .modal-content {
    animation: modalSlideUp 0.35s cubic-bezier(0.0, 0.0, 0.2, 1);
  }
  /* Lock body scroll when modal open */
  body.modal-open {
    overflow: hidden;
  }

  /* Hide scrollbars on chip rows */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Focus visible for accessibility */
  button:focus-visible, [role="button"]:focus-visible {
    outline: 2px solid var(--brand-accent);
    outline-offset: 2px;
  }

  /* ========================================
     RESPONSIVE LAYOUT
     ======================================== */

  /* Mobile (default): full screen */
  .app-frame {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    /* Use dvh for iOS Safari (avoids address bar issue) */
    min-height: 100dvh;
    margin: 0 auto;
    background: var(--bg-primary);
    position: relative;
    /* Safe area for iOS notch/home indicator */
    padding-top: env(safe-area-inset-top);
  }

  /* Tab bar — same width as frame */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    z-index: 30;
    /* iOS home indicator safe area */
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Layout wrapper for desktop side panel */
  .layout-wrapper {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  /* Tablet: card-style frame */
  @media (min-width: 640px) {
    body {
      background: #f0ede5;
    }
    .layout-wrapper {
      padding: 24px;
      align-items: center;
    }
    .app-frame {
      min-height: 760px;
      max-height: calc(100vh - 48px);
      max-height: calc(100dvh - 48px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 
        0 0 0 1px var(--hairline),
        0 10px 40px rgba(26, 31, 61, 0.08);
      padding-top: 0; /* card style — no safe area in card */
    }
    .tab-bar {
      position: absolute;
      bottom: 0;
      padding-bottom: 0;
    }
  }

  /* Desktop: side panel with verification checklist */
  @media (min-width: 1024px) {
    .layout-wrapper {
      gap: 40px;
      align-items: center;
    }
    .side-panel {
      display: block;
      max-width: 320px;
      flex-shrink: 0;
    }
  }

  /* Side panel — hidden on mobile/tablet */
  .side-panel {
    display: none;
  }

// ============================================================
function ChatTab({ onSaveCard, cards }) {
  const [messages, setMessages] = useState([
    {
      role: "assistant",
      type: "greeting",
      text: "오늘은 무슨 일본어가 궁금하세요?",
    },
  ]);
  const [input, setInput] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [activeStep, setActiveStep] = useState(0);
  const scrollRef = useRef(null);

  const examples = Object.keys(FIXTURES.translations);

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, isLoading]);

  const handleSubmit = (text) => {
    const query = (text || input).trim();
    if (!query) return;

    setMessages((prev) => [...prev, { role: "user", type: "text", text: query }]);
    setInput("");
    setIsLoading(true);

    // Mock latency
    setTimeout(() => {
      const result = FIXTURES.translations[query] || FIXTURES.translations[examples[0]];
      setMessages((prev) => [
        ...prev,
        { role: "assistant", type: "translation", query, result },
      ]);
      setIsLoading(false);
      setActiveStep(0);
    }, 1200);
  };

  return (
    <div className="flex flex-col h-full pb-14">
      <AppHeader centerLabel="My Niche" />

      {/* Season banner — Image 7 main 화면 디자인 */}
      <div className="px-4 pt-3">

          style={{ background: "rgba(107, 143, 113, 0.12)", border: "0.5px solid rgba(107, 143, 113, 0.3)" }}
        >
          <div className="flex items-center gap-2 min-w-0 flex-1">
            <span className="text-base flex-shrink-0">🌿</span>
            <div className="text-[11px] flex-1 min-w-0 truncate" style={{ color: "var(--success)" }}>
              <span className="opacity-70">이번 주 |</span>
              <span className="mx-1.5 font-display font-medium">母の日</span>
              <span className="opacity-70">다가옵니다 → 표현 배우기</span>
            </div>
          </div>
          <div className="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center" style={{ background: "var(--success)" }}>
            <span className="text-white text-xs">→</span>
          </div>
        </div>
      </div>

      {/* Category filter — Image 7 spec, 7개 */}

          {["전체", "직장", "육아", "일상", "소셜", "생활필수", "문화"].map((cat) => {

                <span style={{ color: "var(--success)" }}>STEP 1 ✓</span>
                <span className="text-[#9c9a92]">→</span>
                <span style={{ color: "var(--success)" }}>STEP 2 ✓</span>
                <span className="text-[#9c9a92]">→</span>
                <span style={{ color: "var(--brand-accent)" }}>
                  STEP 3 진행 중
                  <span className="dot inline-block ml-1">.</span>
                  <span className="dot inline-block">.</span>
                  <span className="dot inline-block">.</span>
                </span>
              </div>
              <div className="text-[10px] text-[#9c9a92]">번역 결과를 준비하고 있어요</div>
            </div>
          </div>
        )}
      </div>

      {/* Example chips (when only greeting) */}
      {messages.length === 1 && !isLoading && (
        <div className="px-4 pb-2">
          <div className="text-[11px] text-[#9c9a92] mb-2">아래 예시를 탭해서 시작해보세요</div>
          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            {examples.map((ex, i) => (
              <button
                key={i}
                onClick={() => handleSubmit(ex)}
                className="flex-shrink-0 px-3 py-2 text-xs bg-white border border-[#e8e4dc] rounded-full hover:border-[#1a1f3d] transition-colors"
              >
                {ex}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Recent saved cards — Image 7 horizontal scroll */}
      {cards && cards.length > 0 && messages.length > 1 && (
        <div className="px-4 pb-2">
          <div className="flex items-center gap-1.5 mb-2 text-[10px] text-[#9c9a92]">
            <span>✨</span>
            <span className="uppercase tracking-wider">최근 저장</span>
          </div>
          <div className="flex gap-2 overflow-x-auto no-scrollbar">
            {cards.slice(0, 5).map((card) => (
              <div 
                key={card.id}
                className="flex-shrink-0 w-32 bg-white rounded-xl p-2.5 border border-[#e8e4dc]"
              >
                <div className="font-display text-xs leading-tight mb-1.5 truncate" style={{ color: "var(--brand-primary)" }}>
                  {card.card_type === "sentence" 
                    ? (card.payload.step2_versions?.casual || card.payload.korean_input)
                    : card.card_type === "calendar"
                    ? card.payload.event_name_jp
                    : card.payload.scene}
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-[9px] truncate" style={{ color: "var(--ink-tertiary)" }}>
                    {card.tags?.[0] && `#${card.tags[0]}`}
                  </span>
                  <MasteryBadge status={card.learning_status} hasRealUse={card.has_real_use} size="sm" />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Input */}
      <div className="px-4 py-3 border-t border-[#e8e4dc] bg-white">
        <form onSubmit={(e) => { e.preventDefault(); handleSubmit(); }} className="flex gap-2 items-center">
          {/* Attach clip icon */}
          <button
            type="button"
            className="flex-shrink-0 w-8 h-8 flex items-center justify-center text-[#9c9a92] hover:text-[#1a1a1a] transition-colors"
            title="첨부 (이미지·파일)"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea
            value={input}
            onChange={(e) => setInput(e.target.value)}
            placeholder="오늘 하고 싶은 말을 한국어로..."
            rows="1"
            className="flex-1 resize-none px-4 py-2.5 bg-[#faf8f4] border border-[#e8e4dc] rounded-2xl text-sm focus:outline-none focus:border-[#1a1f3d] transition-colors"
            onKeyDown={(e) => {
              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
              }
            }}
          />
          <button
            type="submit"
            disabled={!input.trim()}
            className="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-white transition-opacity disabled:opacity-30"
            style={{ background: "var(--brand-accent)" }}
          >
            {ICONS.send}
          </button>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// MESSAGE COMPONENT
// ============================================================
function Message({ message, onSaveCard, activeStep, setActiveStep }) {
  if (message.role === "user") {
    return (
      <div className="flex justify-end">
        <div className="max-w-[80%] bg-[#1a1f3d] text-white px-4 py-2.5 rounded-2xl rounded-br-sm text-sm">
          {message.text}
        </div>
      </div>
    );
  }

  if (message.type === "greeting") {
    return (
      <div className="flex items-end gap-2 anim-slide-up">
        <div className="w-8 h-8 flex-shrink-0">
          <DarumaAvatar mood="default" size={32} />
        </div>
        <div className="bg-white px-4 py-2.5 rounded-2xl rounded-bl-sm text-sm shadow-[var(--shadow-soft)] max-w-[80%]">
          {message.text}
        </div>
      </div>
    );
  }

  if (message.type === "translation") {
    return <TranslationBlock query={message.query} result={message.result} onSaveCard={onSaveCard}/>;
  }

  return null;
}

// ============================================================
// TRANSLATION BLOCK — 5단계 딥 번역 결과
// ============================================================
function TranslationBlock({ query, result, onSaveCard }) {
  const [activeVersion, setActiveVersion] = useState(result.recommended_version);
  const [showCultureNote, setShowCultureNote] = useState(false);
  const [showEtymology, setShowEtymology] = useState(false);
  const [saved, setSaved] = useState(false);

  const versions = ["casual", "polite", "formal"];
  const versionLabels = { casual: "친근", polite: "정중", formal: "공식" };

  const handleSave = () => {
    if (saved) return;
    onSaveCard({
      id: "c-" + Date.now(),
      card_type: "sentence",
      learning_status: "learning",
      has_real_use: false,
      real_use_count: 0,
      payload: {
        korean_input: query,
        step2_versions: result.step2_versions,
        has_mnemonic: result.has_mnemonic || false,
      },
      tags: ["방금 추가됨"],
      created_at: new Date().toISOString().slice(0, 10),
    });
    setSaved(true);
  };

  return (
    <div className="anim-slide-up">
      <div className="flex items-end gap-2 mb-2">
        <div className="w-8 h-8 flex-shrink-0">
          <DarumaAvatar mood="joy" size={32} />
        </div>
        <div className="text-xs text-[#6b6b6b]">번역을 완료했어요!</div>
      </div>

      <div className="bg-white rounded-2xl shadow-[var(--shadow-card)] overflow-hidden ml-10 paper-texture">
        {/* Step 0: Cultural correction badge (if any) */}
        {result.step0_cultural.needs_correction && (
          <div className="px-4 py-3 bg-[#fef6ec] border-b border-[#f5d4a3] anim-step-reveal" style={{ animationDelay: "0ms" }}>
            <div className="flex items-start gap-2">
              <span className="text-[#f5a623] text-base mt-0.5">✨</span>
              <div className="flex-1">
                <div className="text-[11px] font-medium text-[#f5a623] mb-1">문화 교정</div>
                <div className="text-xs text-[#6b6b6b] leading-relaxed">
                  <span className="line-through text-[#9c9a92]">{result.step0_cultural.detected}</span>
                  <span className="mx-2">→</span>
                  <span className="font-medium text-[#1a1f3d]">{result.step0_cultural.corrected_to}</span>
                </div>
                <div className="text-[11px] text-[#9c9a92] mt-1.5 leading-relaxed">{result.step0_cultural.reason}</div>
              </div>
            </div>
          </div>
        )}

        {/* Step 1: Structure mapping */}
        <div className="px-4 py-3 border-b border-[#e8e4dc] anim-step-reveal" style={{ animationDelay: "100ms" }}>
          <div className="text-[10px] uppercase tracking-wider text-[#9c9a92] mb-2">STRUCTURE</div>
          <div className="space-y-1.5">
            {result.step1_structure.map((s, i) => {
              const colorMap = { navy: "#1a1f3d", orange: "#e8541a", green: "#27ae60" };
              return (
                <div key={i} className="flex items-center gap-2 text-xs">
                  <span 
                    className="px-2 py-0.5 rounded text-white font-medium text-[10px]"
                    style={{ background: colorMap[s.marker_color] || "var(--ink-secondary)" }}
                  >
                    {s.korean}
                  </span>
                  <span className="text-[#9c9a92]">→</span>
                  <span className="font-display text-sm">{s.japanese}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Step 2: Versions toggle */}
        <div className="px-4 py-4 anim-step-reveal" style={{ animationDelay: "200ms" }}>
          <div className="flex gap-1 mb-3">
            {versions.map((v) => (
              <button
                key={v}
                onClick={() => setActiveVersion(v)}
                className="flex-1 px-2 py-1.5 text-[11px] rounded-full transition-colors"
                style={{
                  background: activeVersion === v ? "#1a1f3d" : "var(--tag-bg)",
                  color: activeVersion === v ? "#fff" : "var(--ink-secondary)",
                  fontWeight: activeVersion === v ? 500 : 400,
                }}
              >
                {versionLabels[v]}
                {result.recommended_version === v && (
                  <span className="ml-1 text-[#f5a623]">★</span>
                )}
              </button>
            ))}
          </div>
          <div className="font-display text-base leading-relaxed text-[#1a1f3d]">
            {result.step2_versions[activeVersion]}
          </div>

          {/* New vocabulary that appears in this politeness level */}
          {result.step2_vocabulary?.[activeVersion]?.length > 0 && (
            <div className="mt-3 pt-3 border-t border-dashed border-[#e8e4dc]">
              <div className="text-[10px] uppercase tracking-wider text-[#9c9a92] mb-2 flex items-center gap-1.5">
                <span>📖</span>
                <span>이 표현의 새 어휘</span>
              </div>
              <div className="space-y-2">
                {result.step2_vocabulary[activeVersion].map((vocab, i) => (
                  <div key={i} className="flex items-start gap-3 p-2.5 bg-[#faf8f4] rounded-lg">
                    <div className="flex-shrink-0">
                      <div className="font-display text-sm text-[#1a1f3d]">{vocab.jp}</div>
                      {vocab.reading && (
                        <div className="text-[10px] text-[#9c9a92] mt-0.5">{vocab.reading}</div>
                      )}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs text-[#1a1f3d] mb-0.5">{vocab.kr}</div>
                      {vocab.note && (
                        <div className="text-[10px] text-[#6b6b6b] leading-relaxed">{vocab.note}</div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Step 3: Grammar points */}
        {result.step3_grammar?.length > 0 && (
          <div className="px-4 py-3 border-t border-[#e8e4dc] anim-step-reveal" style={{ animationDelay: "300ms" }}>
            <div className="text-[10px] uppercase tracking-wider text-[#9c9a92] mb-2">GRAMMAR</div>
            {result.step3_grammar.map((g, i) => (
              <div key={i} className={i > 0 ? "mt-3 pt-3 border-t border-dashed border-[#e8e4dc]" : ""}>
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  <div className="text-xs font-medium">{g.point_name}</div>
                  {g.tag && (
                    <span 
                      className="text-[10px] px-2 py-0.5 rounded-full"
                      style={{ background: "var(--tag-bg)", color: "var(--ink-secondary)" }}
                    >
                      {g.tag}
                    </span>
                  )}
                </div>
                <div className="text-[11px] text-[#6b6b6b] leading-relaxed">{g.explanation}</div>
              </div>
            ))}
          </div>
        )}

        {/* Step 4: Culture note (collapsible) */}
        {result.step4_culture && (
          <div className="border-t border-[#e8e4dc] anim-step-reveal" style={{ animationDelay: "400ms" }}>
            <button
              onClick={() => setShowCultureNote(!showCultureNote)}
              className="w-full px-4 py-2.5 flex items-center justify-between text-[11px] hover:bg-[#faf8f4] transition-colors"
            >
              <span className="flex items-center gap-1.5 text-[#9c9a92] uppercase tracking-wider">
                <span>🍵</span> Culture
              </span>
              <span className="text-[#9c9a92]">{showCultureNote ? "−" : "+"}</span>
            </button>
            {showCultureNote && (
              <div className="px-4 pb-3 text-[11px] text-[#6b6b6b] leading-relaxed">
                {result.step4_culture}
              </div>
            )}
          </div>
        )}

        {/* Step 5: Etymology (collapsible) */}
        {result.step5_etymology && (
          <div className="border-t border-[#e8e4dc] anim-step-reveal" style={{ animationDelay: "500ms" }}>
            <button
              onClick={() => setShowEtymology(!showEtymology)}
              className="w-full px-4 py-2.5 flex items-center justify-between text-[11px] hover:bg-[#faf8f4] transition-colors"
            >
              <span className="flex items-center gap-1.5 text-[#9c9a92] uppercase tracking-wider">
                <span>💡</span> Etymology · 니모닉
              </span>
              <span className="text-[#9c9a92]">{showEtymology ? "−" : "+"}</span>
            </button>
            {showEtymology && (
              <div className="px-4 pb-3">
                <div className="font-display text-lg mb-1">{result.step5_etymology.kanji}<span className="text-xs text-[#9c9a92] ml-2">{result.step5_etymology.reading}</span></div>
                <div className="text-[11px] text-[#6b6b6b] leading-relaxed mb-2">{result.step5_etymology.story}</div>
                <div className="text-[11px] p-2 bg-[#f5e6d3] rounded-lg text-[#854F0B]">
                  💡 {result.step5_etymology.mnemonic}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Save button — Button 컴포넌트 사용 */}
        <div className="px-4 py-3 border-t border-[#e8e4dc] bg-[#faf8f4]">
          <Button
            variant={saved ? "realUse" : "primary"}
            size="md"
            onClick={handleSave}
            disabled={saved}
            className="w-full flex items-center justify-center gap-2"
          >
            {saved ? (
              <>{ICONS.check} 카드에 저장됨</>
            ) : (
              <>{ICONS.bookmark} 내 카드에 저장</>
            )}
          </Button>
        </div>
      </div>
    </div>
  );
}

function CalendarTab() {
  const banner = FIXTURES.calendar_banner;
  const today = new Date(2026, 4, 10); // 2026-05-10
  const year = 2026;
  const month = 4; // May (0-indexed)

  // 이번 달 그리드
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let d = 1; d <= lastDate; d++) days.push(d);

  return (
    <div className="flex flex-col h-full pb-14 overflow-y-auto">
      <AppHeader centerLabel="달력" />

      {/* Season banner — Sage Green pill (Image 7 spec) */}
      <div className="px-4 pt-4">
        <div 
          className="rounded-full p-3 flex items-center justify-between cursor-pointer transition-colors hover:opacity-90"
          style={{ background: "rgba(107, 143, 113, 0.12)", border: "0.5px solid rgba(107, 143, 113, 0.3)" }}
        >
          <div className="flex items-center gap-2 min-w-0 flex-1">
            <span className="text-base flex-shrink-0">🌿</span>
            <div className="text-xs flex-1 min-w-0 truncate" style={{ color: "var(--success)" }}>
              <span className="opacity-70">이번 주 |</span>
              <span className="mx-1.5 font-display font-medium">{banner.event_name_jp}</span>
              <span className="opacity-70">{banner.days_left < 0 ? "지났어요" : "다가옵니다"} → 표현 배우기</span>
            </div>
          </div>
          <div className="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center" style={{ background: "var(--success)" }}>
            <span className="text-white text-sm">→</span>
          </div>
        </div>
      </div>

      {/* Month grid */}
      <div className="px-4 pt-4 pb-6">
        <div className="text-[10px] uppercase tracking-wider text-[#9c9a92] mb-3">May 2026</div>
        <div className="grid grid-cols-7 gap-1 mb-2">
          {["日","月","火","水","木","金","土"].map((d, i) => (
            <div key={i} className="text-center text-[10px] text-[#9c9a92] py-1">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {days.map((d, i) => {
            const isToday = d === 10;
            const isHoliday = d === 5;
            return (
              <div 
                key={i}
                className="aspect-square flex items-center justify-center text-xs relative rounded-lg"
                style={{
                  background: isToday ? "#1a1f3d" : (isHoliday ? "#fef6ec" : "transparent"),
                  color: isToday ? "#fff" : (isHoliday ? "var(--cultural-tip)" : (d ? "#1a1f3d" : "transparent")),
                  fontWeight: isToday ? 500 : 400,
                }}
              >
                {d}
                {isHoliday && <div className="absolute bottom-1 w-1 h-1 rounded-full bg-[#f5a623]"></div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Upcoming events */}
      <div className="px-4 pb-6">
        <div className="text-[10px] uppercase tracking-wider text-[#9c9a92] mb-3">다가오는 일본 행사</div>
        <div className="space-y-2">
          {[
            { date: "6/1", jp: "衣替え", kr: "의류 교체일" },
            { date: "6/21", jp: "夏至", kr: "하지" },
            { date: "7/7", jp: "七夕", kr: "칠석" },
          ].map((e, i) => (
            <div key={i} className="bg-white rounded-xl p-3 flex items-center justify-between border border-[#e8e4dc]">
              <div className="flex items-center gap-3">
                <div className="text-xs font-medium text-[#9c9a92] w-10">{e.date}</div>
                <div>
                  <div className="font-display text-sm">{e.jp}</div>
                  <div className="text-[11px] text-[#9c9a92]">{e.kr}</div>
                </div>
              </div>
              <span className="text-[#9c9a92] text-sm">›</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// BUTTON — 디자인 시스템 시트 ⑤ 5종 통합 컴포넌트
// 사용: <Button variant="primary">확인</Button>
// variants: primary | secondary | ghost | danger | realUse
// ============================================================
function Button({ variant = "primary", size = "md", children, onClick, disabled, type = "button", className = "" }) {
  const variantStyles = {
    primary:   { background: "var(--brand-accent)", color: "#fff", border: "none" },
    secondary: { background: "var(--surface)", color: "var(--brand-accent)", border: "1px solid var(--brand-accent)" },
    ghost:     { background: "transparent", color: "var(--ink-primary)", border: "none" },
    danger:    { background: "var(--surface)", color: "var(--map-pin)", border: "1px solid var(--map-pin)" },
    realUse:   { background: "var(--real-use)", color: "#fff", border: "none" },
  };

  const sizeStyles = {
    sm: { padding: "6px 12px", fontSize: "12px" },
    md: { padding: "8px 16px", fontSize: "13px" },
    lg: { padding: "10px 24px", fontSize: "14px" },
  };

  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      className={`rounded-full font-medium transition-all disabled:opacity-30 ${className}`}
      style={{ ...variantStyles[variant], ...sizeStyles[size] }}
    >
      {children}
    </button>
  );
}

// ============================================================
// MASTERY BADGE — 시트의 ⑫ Mastery Badges 4단계
// ============================================================
function MasteryBadge({ status, hasRealUse, size = "sm" }) {
  // 우선순위: 완전정복(써봤어요+숙달) > 숙달완료 > 써봤어요 > 학습중
  const isPerfect = status === "mastered" && hasRealUse;
  const isMastered = status === "mastered" && !hasRealUse;
  const isUsed = status === "learning" && hasRealUse;
  const isLearning = status === "learning" && !hasRealUse;

  const config = isPerfect
    ? { label: "완전정복", icon: "👑", color: "var(--badge-perfect)", bg: "rgba(231, 76, 60, 0.1)" }
    : isMastered
    ? { label: "숙달완료", icon: "✓", color: "var(--badge-mastered)", bg: "rgba(107, 143, 113, 0.12)" }
    : isUsed
    ? { label: "써봤어요", icon: "✓", color: "var(--badge-real-use)", bg: "rgba(39, 174, 96, 0.1)" }
    : { label: "학습중", icon: "🌱", color: "#8e8a82", bg: "rgba(212, 208, 197, 0.4)" };

  if (size === "sm") {
    return (
      <span 
        className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] font-medium"
        style={{ background: config.bg, color: config.color }}
        title={config.label}
      >
        <span>{config.icon}</span>
      </span>
    );
  }
  return (
    <span 
      className="inline-flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-medium"
      style={{ background: config.bg, color: config.color }}
    >
      <span>{config.icon}</span>
      <span>{config.label}</span>
    </span>
  );
}

// ============================================================
// MODAL — 공통 풀스크린 모달 (오버레이 + ESC 닫기 + 스크롤 잠금)
// ============================================================
function Modal({ open, onClose, children }) {
  useEffect(() => {
    if (!open) return;

    // ESC로 닫기
    const handleKey = (e) => {
      if (e.key === "Escape") onClose();
    };
    window.addEventListener("keydown", handleKey);

    // 바디 스크롤 잠금
    document.body.classList.add("modal-open");

    return () => {
      window.removeEventListener("keydown", handleKey);
      document.body.classList.remove("modal-open");
    };
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div 
      className="modal-overlay fixed inset-0 z-50 flex items-end justify-center"
      style={{ background: "rgba(26, 31, 61, 0.45)" }}
      onClick={onClose}
    >
      <div 
        className="modal-content w-full max-w-[420px] max-h-[95vh] max-h-[95dvh] overflow-y-auto rounded-t-3xl"
        style={{ background: "var(--bg-primary)" }}
        onClick={(e) => e.stopPropagation()}
      >
        {/* Drag handle */}
        <div className="flex justify-center pt-3 pb-1">
          <div className="w-10 h-1 rounded-full" style={{ background: "var(--hairline)" }}></div>
        </div>
        {children}
      </div>
    </div>
  );
}

                      <path d="M11 5L6 9H2v6h4l5 4V5z" strokeLinecap="round" strokeLinejoin="round"/>
                      <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                </div>
              )}

            {/* Sections */}

                  </div>

                      <div className="flex items-center gap-1.5 py-0.5">

}

function FlipCard({ card, onClick }) {

  const renderContent = () => {
    if (card.card_type === "sentence") {
      return (
        <>
          <div className="text-[10px] uppercase tracking-wider mb-2" style={{ color: "var(--ink-tertiary)" }}>한국어</div>
          <div className="text-sm leading-snug" style={{ color: "var(--ink-primary)" }}>{card.payload.korean_input}</div>
          {card.payload.step2_versions?.casual && (
            <div className="font-display text-xs mt-2 leading-tight truncate" style={{ color: "var(--brand-accent)" }}>
              {card.payload.step2_versions.casual}
            </div>
          )}
        </>
      );
    }
    if (card.card_type === "calendar") {
      return (
        <>
          <div className="text-2xl mb-2">{card.payload.event_emoji}</div>
          <div className="text-sm font-medium">{card.payload.event_name_kr}</div>
          <div className="font-display text-xs mt-1" style={{ color: "var(--brand-accent)" }}>
            {card.payload.event_name_jp}
          </div>
          <div className="text-[10px] mt-1" style={{ color: "var(--ink-tertiary)" }}>{card.payload.event_date}</div>
        </>
      );
    }
    if (card.card_type === "episode") {
      return (
        <>
          <div className="text-[10px] uppercase tracking-wider mb-2" style={{ color: "var(--ink-tertiary)" }}>에피소드</div>
          <div className="text-xs italic leading-snug" style={{ color: "var(--ink-primary)" }}>{card.payload.scene}</div>
        </>
      );
    }
  };

  return (
    <button 
      type="button"
      className="aspect-[3/4] cursor-pointer text-left transition-transform active:scale-[0.97]"
      onClick={() => onClick && onClick()}
    >
      <div 
        className="bg-white rounded-2xl p-3 border h-full flex flex-col relative"
        style={{ borderColor: "var(--hairline)" }}
      >
        {/* Top decorations: bookmark + sakura stamp (Image 4 spec) */}
        <div className="absolute top-2 left-2 z-10">
          <BookmarkIcon 
            filled={card.has_real_use} 
            size={14}
            color={card.has_real_use ? "var(--brand-accent)" : "var(--ink-tertiary)"}
          />
        </div>
        {card.card_type === "sentence" && (
          <div className="absolute top-1 right-1 z-10">
            <SakuraStamp size={26} />
          </div>
        )}

        <div className="flex-1 pt-3">{renderContent()}</div>
        <div className="flex items-center justify-between mt-2 pt-2 border-t" style={{ borderColor: "var(--hairline)" }}>
          <div className="flex flex-wrap gap-1">
            {card.tags.slice(0, 1).map((t, i) => (
              <span key={i} className="text-[9px] px-1.5 py-0.5 rounded" 
                    style={{ background: "var(--tag-bg)", color: "var(--ink-secondary)" }}>
                #{t}
              </span>
            ))}
          </div>
          <div className="flex gap-1 items-center">
            <MasteryBadge status={card.learning_status} hasRealUse={card.has_real_use} size="sm" />
            {card.payload.has_mnemonic && (
              <span 
                className="text-[9px] px-1 py-0.5 rounded font-medium"
                style={{ background: "rgba(155, 89, 182, 0.12)", color: "var(--mnemonic)" }}
                title="니모닉있음"
              >💡</span>
            )}
          </div>
        </div>
      </div>
    </button>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [activeTab, setActiveTab] = useState("chat");
  const [cards, setCards] = useState(FIXTURES.cards);
  // 모달 상태
  const [detailCard, setDetailCard] = useState(null);
  const [teacherCard, setTeacherCard] = useState(null);

  const handleSaveCard = (newCard) => {
    setCards((prev) => [newCard, ...prev]);
  };

  const handleSaveRealUse = (card) => {
    // "써봤어요!" 클릭 → has_real_use=true로 마크
    setCards((prev) => prev.map(c => 
      c.id === card.id 
        ? { ...c, has_real_use: true, real_use_count: (c.real_use_count || 0) + 1 } 
        : c
    ));
    // 토스트나 피드백은 추후
    setDetailCard(null);
  };

  const handleOpenTeacher = () => {
    // 첫 번째 sentence 카드를 선생님 모드 주제로
    const firstSentence = cards.find(c => c.card_type === "sentence");
    if (firstSentence) setTeacherCard(firstSentence);
  };

  return (
    <div className="layout-wrapper">
      <div className="app-frame relative overflow-hidden">
        <div className="h-full" style={{ display: activeTab === "chat" ? "block" : "none" }}>
          <ChatTab onSaveCard={handleSaveCard} cards={cards} />
        </div>
        <div className="h-full" style={{ display: activeTab === "calendar" ? "block" : "none" }}>
          <CalendarTab />
        </div>
        <div className="h-full" style={{ display: activeTab === "life" ? "block" : "none" }}>
          <LifeTab />
        </div>
        <div className="h-full" style={{ display: activeTab === "deck" ? "block" : "none" }}>
          <MyDeckTab 
            cards={cards} 
            onCardClick={setDetailCard}
            onOpenTeacher={handleOpenTeacher}
            onGoToLife={() => setActiveTab("life")}
          />
        </div>
        <TabBar active={activeTab} onChange={setActiveTab} />
      </div>
      <SidePanel activeTab={activeTab} savedCardCount={cards.length} />

      {/* Modals — app-frame 외부에 두어 fixed positioning이 viewport 기준 동작 */}
      <CardDetailModal 
        open={!!detailCard} 
        onClose={() => setDetailCard(null)} 
        card={detailCard}
        onSaveRealUse={handleSaveRealUse}
      />
      <TeacherModeModal 
        open={!!teacherCard} 
        onClose={() => setTeacherCard(null)} 
        card={teacherCard}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
